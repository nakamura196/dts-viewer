version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # minor/patch はまとめて 1 PR にして PR 洪水を防ぐ
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    # サプライチェーン攻撃対策: 公開直後のバージョンは取り込まない。
    # security update は cooldown を無視して即時適用される。
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
