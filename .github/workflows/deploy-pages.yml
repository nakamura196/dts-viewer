# Build and deploy the Next.js static export to GitHub Pages.
# Vercel build is kept independent (vercel.json handles redirect).
name: Deploy Next.js site to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          # next.config.ts reads this and prepends to all URLs / assets.
          NEXT_PUBLIC_BASE_PATH: /dts-viewer
          # GA4 Measurement ID (公開値). Repo Variables に NEXT_PUBLIC_GA_ID を
          # 設定したデプロイ者だけが計測を有効化する。フォーク先で意図せず
          # オーナーの GA に送信しないため、fallback は持たない。未設定なら
          # ビルドは成功するが GoogleAnalytics は描画されない。
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
        run: npm run build

      - name: Add .nojekyll
        # Prevents GitHub Pages from running Jekyll, which would strip files
        # whose names start with underscore (e.g. Next.js's _next/ directory).
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./out

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
